<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMG Connect — Campanhas Comerciais</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-dark:   #1a4d2e;
  --green-mid:    #2d7a4f;
  --green-light:  #4caf70;
  --green-pale:   #e8f5ed;
  --green-border: #c3e0cd;
  --amber:        #f59e0b;
  --amber-pale:   #fef3d9;
  --violet:       #8b5cf6;
  --violet-pale:  #efe9fd;
  --blue:         #3b82f6;
  --blue-pale:    #e6f0fe;
  --red:          #ef4444;
  --red-pale:     #fef2f0;
  --white:        #ffffff;
  --gray-0:       #f4f5f4;
  --gray-1:       #eceeed;
  --gray-2:       #d4d6d3;
  --gray-text:    #6b7280;
  --text-dark:    #111827;
  --radius:       10px;
  --surface: var(--white);
  --page-bg: var(--gray-0);
}
[data-theme="dark"] {
  --gray-0: #12181a;
  --gray-1: #1c2426;
  --gray-2: #2b3538;
  --gray-text: #9aa5a3;
  --text-dark: #eef2f0;
  --surface: #1a2224;
  --page-bg: #0e1314;
  --green-pale: #17301f;
  --green-border: #244a30;
  --amber-pale: #3a2c0e;
  --violet-pale: #2a2140;
  --blue-pale: #16273f;
  --red-pale: #3a1c18;
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--page-bg); color: var(--text-dark); height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}
@keyframes cardEnter { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmerMove { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes floatUp { from { opacity:0; transform: translateY(8px) scale(0.96); } to { opacity:1; transform: translateY(0) scale(1); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes modalIn { from { opacity:0; transform: translateY(14px) scale(.98); } to { opacity:1; transform: translateY(0) scale(1); } }

/* ── Header ── */
.hdr { background: var(--green-dark); padding: 0 22px; display: flex; align-items: center; justify-content: space-between; height: 54px; flex-shrink: 0; position: relative; overflow: hidden; }
.hdr::after { content: ''; position: absolute; left:0; right:0; bottom:0; height:2px; background: linear-gradient(90deg, transparent, var(--green-light), transparent); background-size: 200% 100%; animation: shimmerMove 4.5s linear infinite; }
.hdr-left { display: flex; align-items: center; gap: 12px; }
.hdr-badge { width: 34px; height: 34px; background: white; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 10.5px; color: var(--green-dark); }
.hdr h1 { color: white; font-size: 14.5px; font-weight: 500; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.hdr-pill { background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.85); font-size: 11px; padding: 3px 11px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.18); cursor: pointer; }
.hdr-pill:hover { background: rgba(255,255,255,0.2); }

/* ── Layout ── */
.body-layout { display: grid; grid-template-columns: 208px 1fr; flex: 1; overflow: hidden; }
.sidebar { background: var(--surface); border-right: 1px solid var(--gray-1); padding: 14px 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; font-size: 13px; color: var(--text-dark); cursor: pointer; transition: all .14s ease; user-select: none; }
.nav-item .ic { font-size: 15px; width: 18px; text-align: center; }
.nav-item:hover { background: var(--green-pale); }
.nav-item.active { background: var(--green-dark); color: white; font-weight: 500; }
.nav-sep { height: 1px; background: var(--gray-1); margin: 8px 4px; }

.main { overflow-y: auto; padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
.page-hdr { display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 17px; font-weight: 700; }
.page-sub { font-size: 12px; color: var(--gray-text); margin-top: 2px; }

/* ── Buttons ── */
.btn { padding: 8px 14px; border-radius: 7px; font-size: 12.5px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all .14s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--green-dark); color: white; }
.btn-primary:hover { background: var(--green-mid); }
.btn-ghost { background: transparent; color: var(--green-dark); border-color: var(--green-border); }
.btn-ghost:hover { background: var(--green-pale); }
.btn-danger { background: transparent; color: #9b2c1d; border-color: #f3c9c1; }
.btn-danger:hover { background: var(--red-pale); }
.btn-sm { padding: 5px 10px; font-size: 11.5px; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* ── KPI cards ── */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 10px; }
.kpi-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--gray-1); padding: 13px 14px 13px 17px; position: relative; overflow: hidden; animation: cardEnter .5s cubic-bezier(.2,.7,.3,1) both; transition: transform .2s ease, box-shadow .2s ease; }
.kpi-card:hover { transform: translateY(-3px); box-shadow: 0 12px 26px -14px rgba(26,77,46,.28); }
.kpi-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background: var(--accent-color, var(--green-dark)); }
.kpi-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-text); margin-bottom: 5px; font-weight: 600; }
.kpi-value { font-size: 19px; font-weight: 700; line-height: 1; background: linear-gradient(90deg, var(--accent-color, var(--green-dark)), var(--accent-color2, var(--green-mid))); -webkit-background-clip: text; background-clip: text; color: transparent; }
.kpi-icon { position:absolute; top:12px; right:12px; width:24px; height:24px; border-radius:8px; background: var(--accent-soft, var(--green-pale)); display:flex; align-items:center; justify-content:center; font-size: 12px; }

/* ── Chart / generic box ── */
.box { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--gray-1); padding: 16px; position: relative; animation: cardEnter .5s cubic-bezier(.2,.7,.3,1) both; }
.box-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.box-title { font-size: 12.5px; font-weight: 600; }
.tag { font-size: 10px; background: var(--green-pale); color: var(--green-dark); padding: 2px 9px; border-radius: 12px; border: 1px solid var(--green-border); }
.row-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 14px; }
.row-2-even { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

/* ── Campaign cards ── */
.campanha-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 14px; }
.campanha-card { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--gray-1); background: var(--surface); cursor: pointer; transition: transform .18s, box-shadow .18s; animation: cardEnter .5s both; }
.campanha-card:hover { transform: translateY(-3px); box-shadow: 0 14px 28px -16px rgba(0,0,0,.25); }
.campanha-banner { height: 74px; display:flex; align-items:flex-end; padding: 10px 14px; color: white; font-weight: 700; font-size: 14px; background-size: cover; background-position: center; }
.campanha-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
.campanha-meta { font-size: 11px; color: var(--gray-text); display: flex; justify-content: space-between; }
.status-pill { font-size: 9.5px; font-weight: 700; padding: 2px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: .3px; }
.status-pill.ativa { background: var(--green-pale); color: var(--green-dark); }
.status-pill.encerrada { background: var(--gray-1); color: var(--gray-text); }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }
table.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
table.data-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: var(--gray-text); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--gray-1); white-space: nowrap; }
table.data-table td { padding: 7px 10px; border-bottom: 1px solid var(--gray-1); white-space: nowrap; }
table.data-table tr:hover td { background: var(--green-pale); }
.rank-pos { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:6px; background: var(--green-dark); color:white; font-size:10.5px; font-weight:700; }
.badge-eleg { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 12px; }
.badge-eleg.sim { background: var(--green-pale); color: var(--green-dark); }
.badge-eleg.nao { background: var(--red-pale); color: #9b2c1d; }

/* ── Forms ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 11px; font-weight: 600; color: var(--gray-text); }
.field input, .field select, .field textarea {
  padding: 8px 10px; border: 1px solid var(--gray-1); border-radius: 7px; background: var(--page-bg);
  font-size: 12.5px; color: var(--text-dark); outline: none; font-family: inherit;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green-mid); background: var(--surface); }
.field textarea { resize: vertical; min-height: 56px; }
.search-input { padding: 8px 12px; border: 1px solid var(--gray-1); border-radius: 7px; background: var(--surface); font-size: 12.5px; min-width: 220px; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 680px; max-height: 88vh; overflow-y: auto; animation: modalIn .18s ease both; }
.modal.wide { max-width: 900px; }
.modal-hdr { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--gray-1); position: sticky; top:0; background: var(--surface); z-index: 2; }
.modal-hdr h3 { font-size: 14.5px; }
.modal-close { cursor: pointer; font-size: 18px; color: var(--gray-text); background:none; border:none; }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--gray-1); display: flex; justify-content: flex-end; gap: 8px; }

/* ── Rule builder ── */
.rule-row { display: grid; grid-template-columns: 1.3fr .8fr .5fr .7fr .05fr 1fr .7fr auto; gap: 6px; align-items: center; background: var(--page-bg); border: 1px solid var(--gray-1); border-radius: 8px; padding: 8px; font-size: 11.5px; }
.rule-row select, .rule-row input { padding: 6px 7px; font-size: 11.5px; border: 1px solid var(--gray-1); border-radius: 6px; background: var(--surface); width: 100%; }
.rule-arrow { text-align: center; font-weight: 700; color: var(--green-mid); }
.rule-remove { background: none; border: none; color: #9b2c1d; cursor: pointer; font-size: 14px; }
.rule-toggle { width: 15px; height: 15px; }
.section-title { font-size: 12px; font-weight: 700; color: var(--green-dark); display: flex; align-items: center; justify-content: space-between; }

/* ── Wizard (importação) ── */
.wizard-steps { display: flex; gap: 6px; margin-bottom: 4px; }
.wizard-step { flex: 1; text-align: center; font-size: 11px; padding: 8px 4px; border-radius: 7px; background: var(--gray-1); color: var(--gray-text); font-weight: 600; }
.wizard-step.active { background: var(--green-dark); color: white; }
.wizard-step.done { background: var(--green-pale); color: var(--green-dark); }
.map-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px dashed var(--gray-1); font-size: 12.5px; }

/* ── Chips (rankings/filters) ── */
.chip-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.chip-btn { font-size: 11.5px; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--gray-1); background: var(--surface); cursor: pointer; font-weight: 500; transition: all .14s; }
.chip-btn:hover { border-color: var(--green-mid); }
.chip-btn.active { background: var(--green-dark); color: white; border-color: var(--green-dark); }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--gray-text); font-size: 12.5px; }
.empty-state .ic { font-size: 30px; margin-bottom: 8px; }

/* ── Toast ── */
.toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: white; padding: 10px 18px; border-radius: 8px; font-size: 12px; z-index: 300; display: none; }
.toast.show { display: block; animation: floatUp .2s; }
.toast.err { background: #7f1d1d; }

/* ── Drag handle (desempate) ── */
.desempate-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 1px solid var(--gray-1); border-radius: 8px; background: var(--page-bg); font-size: 12.5px; cursor: grab; }
.desempate-item .handle { color: var(--gray-text); }

/* ── Módulo Períodos ── */
.periodo-kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 10px; }
.timeline-wrap { display: flex; flex-direction: column; gap: 8px; }
.timeline-week { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--gray-1); border-radius: 8px; background: var(--page-bg); font-size: 12px; }
.timeline-week .tw-icon { font-size: 16px; width: 22px; text-align:center; }
.timeline-week .tw-label { font-weight: 600; width: 78px; }
.timeline-week .tw-range { color: var(--gray-text); flex: 1; }
.timeline-week.done { border-color: var(--green-border); background: var(--green-pale); }
.timeline-week.current { border-color: var(--amber); background: var(--amber-pale); }
.timeline-week.pending { opacity: .7; }
.period-status-badge { font-size: 9.5px; font-weight: 700; padding: 2px 9px; border-radius: 12px; text-transform: uppercase; letter-spacing: .3px; }
.period-status-badge.concluida { background: var(--green-pale); color: var(--green-dark); }
.period-status-badge.andamento { background: var(--amber-pale); color: #92610a; }
.period-status-badge.pendente { background: var(--gray-1); color: var(--gray-text); }
.periodo-compare-box { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
.periodo-compare-col { border: 1px solid var(--gray-1); border-radius: 8px; padding: 12px; background: var(--page-bg); }
.periodo-compare-col h4 { font-size: 11.5px; color: var(--gray-text); text-transform: uppercase; margin-bottom: 6px; }
.periodo-compare-col .range { font-size: 14px; font-weight: 700; color: var(--green-dark); }
.periodo-compare-arrow { font-size: 18px; color: var(--gray-text); }
.radio-line { display: flex; align-items: center; gap: 8px; font-size: 12.5px; cursor: pointer; padding: 6px 0; }
.radio-line input { width: 15px; height: 15px; }

@media print {
  .sidebar, .hdr, .btn, .page-hdr .btn, .no-print { display: none !important; }
  .main { overflow: visible !important; }
  body { overflow: visible !important; height: auto !important; }
}

@media (prefers-reduced-motion: reduce) {
  .kpi-card, .box, .hdr::after, .campanha-card { animation: none !important; }
  * { transition-duration: .01ms !important; }
}

</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-badge">PMG</div>
    <h1>Gestão de Campanhas Comerciais</h1>
  </div>
  <div class="hdr-right">
    <span class="hdr-pill" id="hdrCampanhaAtiva">nenhuma campanha ativa</span>
    <span class="hdr-pill" id="themeToggle" style="cursor:pointer;">🌙 Tema</span>
  </div>
</div>

<div class="body-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="pageRoot"></main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-hdr">
      <h3 id="modalTitle">Título</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>


/* ===== db.js ===== */
/* ══════════════════ SERVIÇO DE PERSISTÊNCIA (IndexedDB) ══════════════════ */
const DB_NAME = 'pmg_campanhas_db';
const DB_VERSION = 1;
const STORES = ['campanhas', 'produtos', 'representantes', 'vendas', 'regras', 'regrasProduto', 'mapeamentos', 'apuracoes', 'config'];
const MAPA_CATEGORIAS_API = {
  "1":"Bebidas","2":"Derivados de Bovino","3":"Derivados de Suíno","5":"Derivados de Leite",
  "6":"Derivados de Ave","7":"Derivados do Mar","29":"Derivados de Vegetal","30":"Doces",
  "31":"Conservas","32":"Acessórios","33":"Farináceos","34":"Higiene","38":"Salgados",
  "39":"Orientais","40":"Panificação"
};
function categoriaPorIdAPI(idCategoria) {
  return MAPA_CATEGORIAS_API[String(idCategoria)] || '';
}
// 'produtos' (cache do catálogo) e 'config' (preferência de tema) continuam
// no navegador: são dados pessoais, não precisam ser vistos pela equipe toda.
const STORES_LOCAIS = ['produtos', 'config'];

let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      STORES.forEach(name => {
        if (!db.objectStoreNames.contains(name)) {
          db.createObjectStore(name, { keyPath: 'id' });
        }
      });
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function tx(store, mode = 'readonly') {
  return _db.transaction(store, mode).objectStore(store);
}

function uid() {
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
}

/* ---- camada local (IndexedDB) — usada só por 'produtos' e 'config' ---- */
const DBLocal = {
  async init() { if (!_db) await openDB(); return _db; },
  async getAll(store) {
    await this.init();
    return new Promise((resolve, reject) => {
      const req = tx(store).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  },
  async get(store, id) {
    await this.init();
    return new Promise((resolve, reject) => {
      const req = tx(store).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },
  async put(store, obj) {
    await this.init();
    if (!obj.id) obj.id = uid();
    return new Promise((resolve, reject) => {
      const req = tx(store, 'readwrite').put(obj);
      req.onsuccess = () => resolve(obj);
      req.onerror = () => reject(req.error);
    });
  },
  async putMany(store, list) {
    await this.init();
    return new Promise((resolve, reject) => {
      const s = tx(store, 'readwrite');
      list.forEach(obj => { if (!obj.id) obj.id = uid(); s.put(obj); });
      s.transaction.oncomplete = () => resolve(list);
      s.transaction.onerror = () => reject(s.transaction.error);
    });
  },
  async remove(store, id) {
    await this.init();
    return new Promise((resolve, reject) => {
      const req = tx(store, 'readwrite').delete(id);
      req.onsuccess = () => resolve(true);
      req.onerror = () => reject(req.error);
    });
  },
  async clearStore(store) {
    await this.init();
    return new Promise((resolve, reject) => {
      const req = tx(store, 'readwrite').clear();
      req.onsuccess = () => resolve(true);
      req.onerror = () => reject(req.error);
    });
  },
};

/* ---- camada remota (Supabase, via rotas serverless) — usada pelos demais stores ---- */
const ENDPOINT_POR_STORE = {
  campanhas: '/api/campanhas',
  representantes: '/api/campanhas-representantes',
  vendas: '/api/campanhas-vendas',
  regras: '/api/campanhas-regras',
  regrasProduto: '/api/campanhas-regras-produto',
  mapeamentos: '/api/campanhas-mapeamentos',
  apuracoes: '/api/campanhas-apuracoes',
};

async function apiCall(method, store, params, body) {
  const url = ENDPOINT_POR_STORE[store];
  if (!url) throw new Error('Store sem rota de API: ' + store);
  const qs = params ? new URLSearchParams(params).toString() : '';
  const resp = await fetch(url + (qs ? '?' + qs : ''), {
    method,
    headers: body !== undefined ? { 'Content-Type': 'application/json' } : undefined,
    body: body !== undefined ? JSON.stringify(body) : undefined
  });
  if (!resp.ok) {
    let msg = `Erro ao acessar ${store} (${resp.status})`;
    try { const j = await resp.json(); if (j.erro) msg = j.erro; } catch (e) {}
    throw new Error(msg);
  }
  return resp.status === 204 ? null : resp.json();
}

const DBRemote = {
  async getAll(store) { return await apiCall('GET', store); },
  async get(store, id) {
    const lista = await apiCall('GET', store, { id });
    return (lista && lista[0]) || null;
  },

    if (!obj.id) obj.id = uid();
    await apiCall('POST', store, null, obj);
    return obj;
  },
  async putMany(store, list) {
    list.forEach(obj => { if (!obj.id) obj.id = uid(); });
    if (list.length) await apiCall('POST', store, null, list);
    return list;
  },
  async remove(store, id) { await apiCall('DELETE', store, { id }); return true; },
  async clearStore(store) { await apiCall('DELETE', store, { all: 1 }); return true; },
};

const CATALOGO = {
  _cache: null,
  _carregando: null,

  /** Busca o catálogo (mesma fonte usada pelo Gerador de Catálogo), com cache em memória. */
  async carregar(forcar = false) {
    if (this._cache && !forcar) return this._cache;
    if (this._carregando && !forcar) return this._carregando;

    this._carregando = (async () => {
      try {
        const resp = await fetch('/api/produtos-supabase');
        if (!resp.ok) throw new Error('Falha ao carregar catálogo (' + resp.status + ')');
        const dados = await resp.json();
        this._cache = dados.map(p => ({
          id: p.id,
          codigo: String(p.id),
          nome: p.nome || '',
          categoria: categoriaPorId(p.id_categoria),
          idCategoria: p.id_categoria,

          precoEntrega: p.preco_entrega,

          imagem: p.imagem,
          descricao: p.descricao,
          destaque: !!p.destaque,
          ativo: true
        }));
        return this._cache;
      } catch (err) {
        console.error('[CATALOGO] erro ao carregar', err);
        this._cache = this._cache || [];
        return this._cache;
      } finally {
        this._carregando = null;
      }
    })();

    return this._carregando;
  },

function fmtMoney(n) { n = Number(n) || 0; return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function fmtKg(n) { n = Number(n) || 0; return n.toLocaleString('pt-BR', { maximumFractionDigits: 0 }) + ' kg'; }
function fmtNum(n) { return (Number(n) || 0).toLocaleString('pt-BR'); }
function fmtSaldo(n) { n = Number(n) || 0; return (n >= 0 ? '+' : '') + fmtNum(n); }
function fmtDate(iso) { if (!iso) return '—'; const d = new Date(iso + 'T00:00:00'); return d.toLocaleDateString('pt-BR'); }
function fmtDataBR(d) { if (!d) return '—'; return d.toLocaleDateString('pt-BR'); }

function parseNumBR(v) {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'number') return v;
  const s = String(v).trim().replace(/\./g, '').replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function normalizeKey(str) {
  return String(str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim().toUpperCase().replace(/\s+/g, ' ');
}

function toTitleCasePtBr(str) {
  const minusculas = ['de', 'da', 'do', 'das', 'dos', 'e'];
  return String(str || '').toLowerCase().split(' ').map((w, i) => {
    if (i > 0 && minusculas.includes(w)) return w;
    return w.charAt(0).toUpperCase() + w.slice(1);
  }).join(' ');
}

// similaridade simples entre strings (para sugerir mapeamento de colunas sem depender do nome exato)
// separa uma string em tokens/palavras normalizadas (sem acento, maiúsculas, sem pontuação)
function tokenize(str) {
  return normalizeKey(str).split(/[^A-Z0-9]+/).filter(Boolean);
}

// similaridade simples entre strings (para sugerir mapeamento de colunas sem depender do nome exato)
function similarity(a, b) {
  const ta = tokenize(a), tb = tokenize(b);
  if (!ta.length || !tb.length) return 0;
  if (normalizeKey(a) === normalizeKey(b)) return 1;
  const setA = new Set(ta), setB = new Set(tb);
  const inter = [...setA].filter(t => setB.has(t)).length;
  if (inter === 0) return 0; // sem nenhuma palavra em comum -> nunca sugere
  return inter / Math.max(setA.size, setB.size);
}

// Mapeia TODOS os campos de uma vez, com exclusividade: cada coluna da planilha
// só pode ser usada por um campo do formulário (o de maior confiança primeiro).
function suggestColumnsMapping(headers, camposAlvo) {
  const candidatos = [];
  camposAlvo.forEach(campo => {
    headers.forEach(h => {
      let melhor = 0;
      campo.aliases.forEach(alias => { melhor = Math.max(melhor, similarity(h, alias)); });
      if (melhor >= 0.5) candidatos.push({ chave: campo.chave, header: h, score: melhor });
    });
  });
  candidatos.sort((a, b) => b.score - a.score);

  const mapping = {};
  const headersUsados = new Set();
  candidatos.forEach(c => {
    if (mapping[c.chave] || headersUsados.has(c.header)) return; // campo já resolvido ou coluna já usada
    mapping[c.chave] = c.header;
    headersUsados.add(c.header);
  });
  return mapping;
}

/* ===== periodos.js ══════════════════════════════════════════════
   NÚCLEO DE CÁLCULO DE PERÍODOS / SEMANAS COMERCIAIS
   Semana comercial: segunda-feira (00:00) até domingo (23:59).
   Toda campanha começa numa segunda e termina numa segunda
   (data de fechamento), formando N semanas completas.
   ═══════════════════════════════════════════════════════════════ */

// Cria um Date "seguro" (meio-dia UTC-local, evita bugs de fuso/DST) a partir de string ISO yyyy-mm-dd
function parseISODate(iso) {
  if (!iso) return null;
  const [y, m, d] = iso.split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}

function toISODate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function addDays(d, n) {
  const nd = new Date(d);
  nd.setDate(nd.getDate() + n);
  return nd;
}

function isMonday(d) { return d.getDay() === 1; }

// Retorna a segunda-feira da semana em que 'd' cai
function segundaDaSemana(d) {
  const dow = d.getDay(); // 0=domingo, 1=segunda...
  const diff = dow === 0 ? -6 : 1 - dow;
  return addDays(d, diff);
}

/**
 * Calcula tudo que o módulo Períodos precisa a partir de dataInicio/dataFim (strings ISO).
 * Convenção adotada: dataInicio e dataFim são ambas segundas-feiras; dataFim é a segunda
 * de FECHAMENTO (ou seja, o período efetivo de vendas vai até o domingo anterior a dataFim,
 * mas para fins de contagem de semanas e exibição, tratamos [dataInicio, dataFim) como
 * a campanha, com semanas de 7 dias cada.
 *
 * Retorna null se as datas forem inválidas ou dataFim <= dataInicio.
 */
function calcularPeriodos(dataInicioISO, dataFimISO) {
  const ini = parseISODate(dataInicioISO);
  const fim = parseISODate(dataFimISO);
  if (!ini || !fim || fim <= ini) return null;

  const diffMs = fim - ini;
  const diffDias = Math.round(diffMs / 86400000);
  const numSemanas = Math.round(diffDias / 7);
  if (numSemanas < 1) return null;

  // segundas-feiras contadas: da inicial até a final, inclusive (numSemanas + 1)
  const numSegundas = numSemanas + 1;

  const avisoNaoSegunda = !isMonday(ini) || !isMonday(fim);

  // Período anterior: contíguo, mesma quantidade de semanas, terminando exatamente onde a campanha começa
  const periodoAnteriorFim = new Date(ini); // fim do anterior = início da campanha (exclusive/fechamento)
  const periodoAnteriorInicio = addDays(periodoAnteriorFim, -7 * numSemanas);

  // Monta o cronograma semanal (semana 1..N), cada uma seg→dom
  const semanas = [];
  for (let i = 0; i < numSemanas; i++) {
    const semanaInicio = addDays(ini, i * 7);
    const semanaFim = addDays(semanaInicio, 6); // domingo
    semanas.push({
      numero: i + 1,
      inicio: semanaInicio,
      fim: semanaFim,
      inicioISO: toISODate(semanaInicio),
      fimISO: toISODate(semanaFim),
    });
  }

  return {
    ini, fim, numSemanas, numSegundas, avisoNaoSegunda,
    periodoAnteriorInicio, periodoAnteriorFim,
    periodoAnteriorInicioISO: toISODate(periodoAnteriorInicio),
    periodoAnteriorFimISO: toISODate(periodoAnteriorFim),
    semanas
  };
}

/**
 * Dado o cronograma de semanas e uma data de referência (default: hoje),
 * retorna o array de semanas com status calculado: 'concluida' | 'andamento' | 'pendente'.
 */
function calcularStatusSemanas(semanas, dataRef = new Date()) {
  const hoje = new Date(dataRef.getFullYear(), dataRef.getMonth(), dataRef.getDate());
  return semanas.map(s => {
    let status;
    if (hoje > s.fim) status = 'concluida';
    else if (hoje >= s.inicio && hoje <= s.fim) status = 'andamento';
    else status = 'pendente';
    return { ...s, status };
  });
}

/**
 * Retorna o índice (1-based) da última semana fechada (concluída) até a data de referência.
 * Se nenhuma semana estiver concluída ainda, retorna 0.
 */
function ultimaSemanaFechada(semanasComStatus) {
  let ultima = 0;
  semanasComStatus.forEach(s => { if (s.status === 'concluida') ultima = s.numero; });
  return ultima;
}

/**
 * Dado o resultado de calcularPeriodos() e um número de semanas (corte parcial),
 * retorna o intervalo [inicio, fim) da campanha e do período anterior, limitados
 * a exatamente 'ateSemana' semanas — nunca comparando quantidades diferentes.
 */
function limitarPeriodoParcial(periodosCalc, ateSemana) {
  const n = Math.max(1, Math.min(ateSemana, periodosCalc.numSemanas));
  const campanhaFimParcial = addDays(periodosCalc.ini, n * 7); // exclusive (segunda seguinte ao fim da semana n)
  const anteriorFimParcial = addDays(periodosCalc.periodoAnteriorInicio, n * 7);
  return {
    numSemanas: n,
    campanhaInicioISO: toISODate(periodosCalc.ini),
    campanhaFimISO: toISODate(campanhaFimParcial),
    anteriorInicioISO: toISODate(periodosCalc.periodoAnteriorInicio),
    anteriorFimISO: toISODate(anteriorFimParcial),
  };
}

/**
 * Info de "hoje" relativa a uma campanha: semana atual, dias decorridos/restantes,
 * próximo fechamento (segunda-feira seguinte).
 */
function infoHojeCampanha(periodosCalc, dataRef = new Date()) {
  const hoje = new Date(dataRef.getFullYear(), dataRef.getMonth(), dataRef.getDate());
  const semanasComStatus = calcularStatusSemanas(periodosCalc.semanas, hoje);
  const semanaAtualObj = semanasComStatus.find(s => s.status === 'andamento');
  const totalSemanas = periodosCalc.numSemanas;

  let semanaAtualNum;
  if (hoje < periodosCalc.ini) semanaAtualNum = 0;
  else if (hoje >= periodosCalc.fim) semanaAtualNum = totalSemanas;
  else semanaAtualNum = semanaAtualObj ? semanaAtualObj.numero : ultimaSemanaFechada(semanasComStatus);

  const diasDecorridos = hoje <= periodosCalc.ini ? 0 : Math.min(
    Math.round((hoje - periodosCalc.ini) / 86400000),
    totalSemanas * 7
  );
  const diasRestantes = Math.max(0, Math.round((periodosCalc.fim - hoje) / 86400000));

  // próximo fechamento: próxima segunda-feira a partir de hoje (inclusive se hoje for segunda e ainda dentro da campanha)
  let proximoFechamento = segundaDaSemana(hoje);
  if (proximoFechamento <= hoje) proximoFechamento = addDays(proximoFechamento, 7);

  const ultimaFechada = ultimaSemanaFechada(semanasComStatus);

  return {
    semanasComStatus,
    semanaAtualNum,
    totalSemanas,
    diasDecorridos,
    diasRestantes,
    proximoFechamento,
    proximoFechamentoISO: toISODate(proximoFechamento),
    ultimaSemanaFechada: ultimaFechada,
    campanhaEncerrada: hoje >= periodosCalc.fim
  };
}


/* ===== rules-engine.js ===== */
/* ══════════════════ MOTOR DE REGRAS ══════════════════
   Cada regra: { id, nome, campo, operador, valor, acao, acaoValor, obrigatoria, ativa }
   campo         -> chave dentro do objeto de métricas do representante (ex: crescimento, clientesCampanha, kgCampanha...)
   operador      -> '>=' '<=' '>' '<' '==' '!='
   acao          -> 'elegivel' | 'desclassificar' | 'pontos' | 'multiplicador' | 'bonus_percentual' | 'penalidade'
   acaoValor     -> número usado pela ação (pontos a somar, % do multiplicador/bônus, etc.)
   obrigatoria   -> se true e a condição falhar, representante é desclassificado
════════════════════════════════════════════════════════ */

const OPERADORES = {
  '>=': (a, b) => a >= b,
  '<=': (a, b) => a <= b,
  '>':  (a, b) => a > b,
  '<':  (a, b) => a < b,
  '==': (a, b) => a === b,
  '!=': (a, b) => a !== b,
};

const CAMPOS_METRICA = [
  { valor: 'kgCampanha', label: 'KG (campanha)' },
  { valor: 'kgAnterior', label: 'KG (período anterior)' },
  { valor: 'faturamentoCampanha', label: 'Faturamento (campanha)' },
  { valor: 'faturamentoAnterior', label: 'Faturamento (período anterior)' },
  { valor: 'clientesCampanha', label: 'Nº de clientes (campanha)' },
  { valor: 'clientesAnterior', label: 'Nº de clientes (anterior)' },
  { valor: 'pedidos', label: 'Nº de pedidos' },
  { valor: 'produtosDistintos', label: 'Produtos distintos vendidos' },
  { valor: 'mix', label: 'Mix (%)' },
  { valor: 'positivacao', label: 'Positivação (nº de clientes)' },
  { valor: 'crescimentoClientes', label: 'Crescimento de clientes (%)' },
  { valor: 'crescimentoKg', label: 'Crescimento de KG (%)' },
  { valor: 'crescimentoFaturamento', label: 'Crescimento de faturamento (%)' },
  { valor: 'pontosProdutos', label: 'Pontos de produtos (acumulado)' },
];

const ACOES = [
  { valor: 'elegivel', label: 'Marcar como elegível' },
  { valor: 'desclassificar', label: 'Desclassificar' },
  { valor: 'pontos', label: 'Somar pontos fixos' },
  { valor: 'multiplicador', label: 'Multiplicar pontuação total (x)' },
  { valor: 'bonus_percentual', label: 'Adicionar bônus (% sobre pontuação)' },
  { valor: 'penalidade', label: 'Subtrair pontos (penalidade)' },
];

/**
 * Aplica o conjunto de regras de uma campanha sobre as métricas de um representante.
 * Retorna { pontosFinal, elegivel, desclassificado, log[] }
 */
function aplicarRegras(regras, metricas, pontosBase) {
  let pontos = pontosBase || 0;
  let elegivel = true;       // elegibilidade do ranking PRINCIPAL
  let elegivelBonus = true;  // elegibilidade de rankings de BÔNUS (ex: positivação, com requisito próprio)
  let desclassificado = false;
  let multiplicadorAcumulado = 1;
  const log = [];

  (regras || []).filter(r => r.ativa !== false).forEach(r => {
    const campoVal = Number(metricas[r.campo]) || 0;
    const alvo = Number(r.valor) || 0;
    const passou = OPERADORES[r.operador] ? OPERADORES[r.operador](campoVal, alvo) : false;
    // escopo: 'geral' (padrão, afeta principal + bônus) | 'principal' | 'bonus'
    const escopo = r.escopo || 'geral';

    if (!passou) {
      if (r.obrigatoria) {
        if (escopo === 'geral' || escopo === 'principal') { desclassificado = true; elegivel = false; }
        if (escopo === 'geral' || escopo === 'bonus') { elegivelBonus = false; }
      }
      log.push({ regra: r.nome, resultado: 'não atendida', obrigatoria: !!r.obrigatoria, escopo });
      return;
    }

    log.push({ regra: r.nome, resultado: 'atendida', escopo });
    switch (r.acao) {
      case 'elegivel': break; // já considerado elegível por padrão
      case 'desclassificar':
        if (escopo === 'geral' || escopo === 'principal') { desclassificado = true; elegivel = false; }
        if (escopo === 'geral' || escopo === 'bonus') { elegivelBonus = false; }
        break;
      case 'pontos': pontos += Number(r.acaoValor) || 0; break;
      case 'multiplicador': multiplicadorAcumulado *= (Number(r.acaoValor) || 1); break;
      case 'bonus_percentual': pontos += pontos * ((Number(r.acaoValor) || 0) / 100); break;
      case 'penalidade': pontos -= Number(r.acaoValor) || 0; break;
    }
  });

  pontos = pontos * multiplicadorAcumulado;
  if (desclassificado) { pontos = 0; elegivel = false; }

  return { pontosFinal: Math.max(0, Math.round(pontos * 100) / 100), elegivel, elegivelBonus, desclassificado, log };
}

/**
 * Calcula pontos de produto para uma lista de linhas de venda de um representante,
 * de acordo com as regras de pontuação por produto/categoria/marca da campanha.
 */
function calcularPontosProdutos(vendasRepresentante, regrasProduto) {
  let total = 0;
  const regrasAtivas = (regrasProduto || []).filter(rp => rp.ativa !== false);
  const especificas = regrasAtivas.filter(rp => rp.escopo !== 'todos');
  const catchAll = regrasAtivas.find(rp => rp.escopo === 'todos');

  vendasRepresentante.forEach(v => {
    let melhorRegra = null;
    especificas.forEach(rp => {
      const alvo = normalizeKey(rp.valor);
      let bate = false;
      if (rp.escopo === 'produto') bate = normalizeKey(v.codigo) === alvo || normalizeKey(v.produto) === alvo;
      if (rp.escopo === 'categoria') bate = normalizeKey(v.categoria) === alvo;
      if (rp.escopo === 'marca') bate = normalizeKey(v.marca) === alvo;
      if (bate) melhorRegra = rp;
    });
    if (!melhorRegra && catchAll) melhorRegra = catchAll;

    if (melhorRegra) {
      const pontosPorKg = Number(melhorRegra.pontosPorKg) || 0;
      const pontosPorUnidade = Number(melhorRegra.pontosPorUnidade) || 0;
      const pontosFixos = Number(melhorRegra.pontosFixos) || 0;
      const mult = Number(melhorRegra.multiplicador) || 1;
      total += (pontosPorKg * (Number(v.kg) || 0) + pontosPorUnidade * (Number(v.unidades) || 0) + pontosFixos) * mult;
    }
  });
  return Math.round(total * 100) / 100;
}

const DESEMPATE_CAMPOS = [
  { valor: 'kgCampanha', label: 'Maior KG' },
  { valor: 'faturamentoCampanha', label: 'Maior faturamento' },

];

function ordenarComDesempate(lista, ordemDesempate) {
  const ordem = (ordemDesempate && ordemDesempate.length) ? ordemDesempate : DESEMPATE_CAMPOS.map(d => d.valor);
  return [...lista].sort((a, b) => {
    if (b.pontosFinal !== a.pontosFinal) return b.pontosFinal - a.pontosFinal;
    for (const campo of ordem) {
      const diff = (Number(b[campo]) || 0) - (Number(a[campo]) || 0);
      if (diff !== 0) return diff;
    }
    return 0;
  });
}

function renderSidebar() {

  sb.innerHTML = NAV.map(item => {

    const active = STATE.route === item.key ? ' active' : '';
    return `<div class="nav-item${active}" onclick="navigate('${item.key}')">
      <span class="ic">${item.icon}</span><span>${item.label}</span>

function openModal(title, bodyHtml, footHtml, wide = false) {
  document.getElementById('modalTitle').textContent = title;

  document.getElementById('modalFoot').innerHTML = footHtml;
  document.getElementById('modalBox').classList.toggle('wide', wide);

  document.getElementById('modalOverlay').classList.remove('show');
}

  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
});

async function initTheme() {
  const tema = await DB.getConfig('tema', 'light');
  document.documentElement.setAttribute('data-theme', tema);
  document.getElementById('themeToggle').textContent = tema === 'dark' ? '☀ Tema' : '🌙 Tema';
}
async function toggleTheme() {
  const atual = document.documentElement.getAttribute('data-theme') || 'light';
  const novo = atual === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', novo);
  document.getElementById('themeToggle').textContent = novo === 'dark' ? '☀ Tema' : '🌙 Tema';
  await DB.setConfig('tema', novo);
}

/* ── Preenchimento automático do formulário via IA (leitura do banner) ── */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function analisarBannerComIA(inputEl) {
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
  const status = document.getElementById('cf_iaStatus');
  status.textContent = '🔎 Analisando imagem...';

  try {
    const base64 = await fileToBase64(file);
    const resp = await fetch('/api/analisar-banner', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imagemBase64: base64, mimeType: file.type })
    });
    const json = await resp.json();
    if (!resp.ok || !json.sucesso) throw new Error(json.erro || 'Falha ao analisar imagem.');

    const d = json.dados;

    if (d.nome) document.getElementById('cf_nome').value = d.nome;
    if (d.fornecedor) document.getElementById('cf_fornecedor').value = d.fornecedor;
    if (d.dataInicio) document.getElementById('cf_dataInicio').value = d.dataInicio;
    if (d.dataFim) document.getElementById('cf_dataFim').value = d.dataFim;
    if (d.descricao) document.getElementById('cf_descricao').value = d.descricao;
    if (d.premiacoes) document.getElementById('cf_premiacoes').value = d.premiacoes;

    atualizarPreviewPeriodo();

    if (Array.isArray(d.regrasProduto) && d.regrasProduto.length) {
      const lista = document.getElementById('regrasProdutoList');
      if (lista) {
        lista.innerHTML = d.regrasProduto.map(r => regraProdutoRowHtml({
          escopo: r.escopo || 'marca',
          valor: r.valor || '',
          pontosPorKg: r.pontosPorKg || '',
          pontosPorUnidade: r.pontosPorUnidade || '',
          pontosFixos: r.pontosFixos || '',
          multiplicador: r.multiplicador || 1,
          ativa: true
        })).join('');
      }
    }

    status.textContent = '✅ Formulário preenchido — revise os campos antes de salvar.';
    showToast('Campanha preenchida a partir do banner. Revise os dados antes de salvar!');
  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    showToast('Erro ao analisar banner: ' + err.message, true);
  }
}

function collectRows(containerId, selector) {
  return Array.from(document.querySelectorAll(`#${containerId} ${selector}`)).map(row => {
    const obj = {};
    row.querySelectorAll('[data-f]').forEach(inp => {
      const f = inp.dataset.f;
      obj[f] = inp.type === 'checkbox' ? inp.checked : inp.value;
    });
    return obj;
  });
}

async function salvarCampanha() {
  const nome = document.getElementById('cf_nome').value.trim();
  const fornecedor = document.getElementById('cf_fornecedor').value.trim();
  if (!nome || !fornecedor) { showToast('Preencha nome e fornecedor.', true); return; }

  const tipos = Array.from(document.querySelectorAll('[data-tipo].active')).map(el => el.dataset.tipo);
  const desempate = Array.from(document.querySelectorAll('#desempateList .desempate-item')).map(el => el.dataset.val);

  const campanha = {
    id: _campanhaModalState.campanha.id || undefined,
    nome, fornecedor,
    dataInicio: document.getElementById('cf_dataInicio').value,
    dataFim: document.getElementById('cf_dataFim').value,
    periodoAnteriorInicio: document.getElementById('cf_perAntInicio').value,
    periodoAnteriorFim: document.getElementById('cf_perAntFim').value,
    cor: document.getElementById('cf_cor').value,
    bannerUrl: document.getElementById('cf_banner').value.trim(),
    descricao: document.getElementById('cf_descricao').value,
    premiacoes: document.getElementById('cf_premiacoes').value,
    ativa: document.getElementById('cf_ativa').checked,
    metaColetivaPct: Number(document.getElementById('cf_metaColetivaPct').value) || null,
    metaColetivaCampo: document.getElementById('cf_metaColetivaCampo').value,
    minClientesBonus: Number(document.getElementById('cf_minClientesBonus').value) || null,
    tipos, desempate
  };

  const periodosCalc = calcularPeriodos(campanha.dataInicio, campanha.dataFim);
  if (!periodosCalc) { showToast('Datas inválidas: verifique data inicial e final.', true); return; }
  campanha.numSemanas = periodosCalc.numSemanas;
  campanha.numSegundas = periodosCalc.numSegundas;
  campanha.periodoAnteriorInicio = periodosCalc.periodoAnteriorInicioISO;
  campanha.periodoAnteriorFim = periodosCalc.periodoAnteriorFimISO;
  if (periodosCalc.avisoNaoSegunda) showToast('Campanha salva, mas alguma das datas não é uma segunda-feira.', true);

  const saved = await DB.put('campanhas', campanha);

  const regrasRows = collectRows('regrasList', '[data-row]').filter(r => r.nome);
  const oldRegras = (await DB.getAll('regras')).filter(r => r.campanhaId === saved.id);
  for (const r of oldRegras) await DB.remove('regras', r.id);
  for (const r of regrasRows) await DB.put('regras', { ...r, campanhaId: saved.id });

  const regrasProdRows = collectRows('regrasProdutoList', '[data-rowp]').filter(r => r.valor);
  const oldRP = (await DB.getAll('regrasProduto')).filter(r => r.campanhaId === saved.id);
  for (const r of oldRP) await DB.remove('regrasProduto', r.id);
  for (const r of regrasProdRows) await DB.put('regrasProduto', { ...r, campanhaId: saved.id });

  showToast('Campanha salva com sucesso!');
  closeModal();
  renderCampanhas();
  atualizarHdrCampanha();
}

async function renderProdutos() {
  root().innerHTML = pageHeader('Produtos', 'Catálogo de produtos usado nas regras de pontuação',

     <select id="prodCatFiltro" onchange="filtrarProdutos()"></select>

    `<div class="box"><div class="table-wrap"><table class="data-table" id="prodTable">
      <thead><tr><th>Ativo</th><th>Imagem</th><th>ID Produto</th><th>Nome Produto</th><th>Categoria</th><th>Marca</th><th>Valor</th></tr></thead>
      <tbody id="prodTbody"></tbody>
    </table></div></div>`;
  await carregarProdutos();

async function sincronizarProdutosAPI() {
  showToast('Sincronizando produtos da API...');
  let dados = null;
  try {
    const resp = await fetch('/api/produtos-supabase');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    dados = await resp.json();
  } catch (err) {
    showToast(`Falha ao sincronizar: ${err.message}`, true);
    return;
  }

  const existentes = await DB.getAll('produtos');
  const porCodigo = new Map(existentes.map(p => [String(p.codigo), p]));

  const lista = dados.map(item => {
    const codigo = String(item.id);
    const existente = porCodigo.get(codigo);
    return {
      id: existente ? existente.id : undefined,
      codigo,
      nome: (item.nome || '').trim(),
      fornecedor: existente?.fornecedor || '',
      categoria: categoriaPorId(item.id_categoria),
      subcategoria: existente?.subcategoria || '',
      marca: existente?.marca || '',
      peso: existente?.peso || '',
      unidade: existente?.unidade || 'un',
      valor: item.preco_entrega || item.preco_retira || existente?.valor || 0,
      pontos: existente?.pontos || 0,
      multiplicador: existente?.multiplicador || 1,
      ativo: existente ? existente.ativo : true
    };
  }).filter(p => p.nome);

  await DB.putMany('produtos', lista);
  showToast(`${lista.length} produtos sincronizados!`);
  await carregarProdutos();
}
let _produtosCache = [];
async function carregarProdutos() {
  const salvos = await DB.getAll('produtos');
  if (!salvos.length) { showToast('Nenhum produto salvo ainda. Clique em "Sincronizar API".'); }
  _produtosCache = salvos.sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));
  const catSel = document.getElementById('prodCatFiltro');
  if (catSel) {
    const categorias = [...new Set(_produtosCache.map(p => p.categoria))].filter(Boolean).sort();
    catSel.innerHTML = '<option value="">Todas as categorias</option>' + categorias.map(c => `<option value="${c}">${c}</option>`).join('');
  }
  desenharProdutos(_produtosCache);
}
async function toggleProdutoAtivo(id, ativo) {
  const p = await DB.get('produtos', id);
  if (!p) return;
  p.ativo = ativo;
  await DB.put('produtos', p);
  const item = _produtosCache.find(x => x.id === id);
  if (item) item.ativo = ativo;
  showToast(ativo ? 'Produto ativado (entra nas contas/regras).' : 'Produto desativado (some das contas/regras).');
}
function desenharProdutos(lista) {
  const tbody = document.getElementById('prodTbody');
  tbody.innerHTML = lista.length ? lista.map(p => `
    <tr style="opacity:${p.ativo === false ? .45 : 1}">
      <td><input type="checkbox" ${p.ativo !== false ? 'checked' : ''} onchange="toggleProdutoAtivo('${p.id}', this.checked)"></td>
      <td>${p.imagem ? `<img src="${p.imagem}" alt="" style="width:34px;height:34px;object-fit:cover;border-radius:6px;">` : '—'}</td>
      <td>${p.codigo}</td>
      <td>${p.nome}</td>
      <td>${p.categoria || '—'}</td>
      <td>${p.marca || p.fornecedor || ''}</td>
      <td>${fmtMoney(p.valor)}</td>
    </tr>`).join('') : `<tr><td colspan="7"><div class="empty-state">📦 Nenhum produto encontrado. Clique em "Sincronizar API".</div></td></tr>`;
}
function filtrarProdutos() {
  const t = normalizeKey(document.getElementById('prodSearch').value);
  const cat = document.getElementById('prodCatFiltro').value;
  let lista = _produtosCache;
  if (cat) lista = lista.filter(p => p.categoria === cat);
  if (t) lista = lista.filter(p => normalizeKey(p.nome + ' ' + p.codigo + ' ' + p.categoria + ' ' + (p.marca||'')).includes(t));
  desenharProdutos(lista);
}

function mapRow(r) {
  const out = {};
  CAMPOS_ALVO.forEach(c => { out[c.chave] = IMP.mapping[c.chave] ? r[IMP.mapping[c.chave]] : ''; });
  return out;
}
function splitCodigoNome(bruto) {
  const s = String(bruto || '').trim();
  const m = s.match(/^(\S+)\s*-\s*(.+)$/);
  return m ? { codigo: m[1].trim(), nome: m[2].trim() } : { codigo: '', nome: s };
}
function splitVendedor(bruto) {
  const s = String(bruto || '').trim();
  const m = s.match(/^(.*)-(\d+)$/); // nome termina, código numérico no final
  return m ? { nome: m[1].trim(), codigoRep: m[2].trim() } : { nome: s, codigoRep: '' };
}
async function wizardConfirmarImportacao() {
  const representantesExistentes = await DB.getAll('representantes');
  const repPorNome = new Map(representantesExistentes.map(r => [normalizeKey(r.nome), r]));
  const novosReps = [];
  const vendas = IMP.rows.map(r => {
  const m = mapRow(r);
  const vend = splitVendedor(m.representante);
  const nomeRep = vend.nome;
  const chave = normalizeKey(nomeRep);
  let rep = repPorNome.get(chave);
  if (!rep && nomeRep) {
    rep = { id: DB.uid(), nome: toTitleCasePtBr(nomeRep), codigo: vend.codigoRep, regiao: '', supervisor: '', ativo: true };
    repPorNome.set(chave, rep);
    novosReps.push(rep);
  }
  const cli = splitCodigoNome(m.clienteBruto);
  const prod = splitCodigoNome(m.produtoBruto);
  return {
    id: DB.uid(),
    campanhaId: IMP.campanhaId,
    periodo: IMP.periodo,
    representanteId: rep ? rep.id : null,
    representanteNome: rep ? rep.nome : nomeRep,
    cliente: cli.nome,
    clienteCodigo: cli.codigo,
    codigo: prod.codigo,
    produto: prod.nome,
    categoria: String(m.categoria || '').trim(),
    marca: String(m.marca || '').trim(),
    unidades: parseNumBR(m.unidades),
    kg: parseNumBR(m.kg),
    valor: parseNumBR(m.valor),
    data: m.data || '',
    pedido: String(m.pedido || '').trim(),
    cidade: String(m.cidade || '').trim(),
    uf: String(m.estado || '').trim().toUpperCase()
  };
});
  if (novosReps.length) await DB.putMany('representantes', novosReps);
  await DB.putMany('vendas', vendas);
  await DB.put('mapeamentos', { id: 'map_' + IMP.campanhaId + '_' + IMP.periodo, campanhaId: IMP.campanhaId, periodo: IMP.periodo, mapping: IMP.mapping });
  showToast(`Importação concluída: ${vendas.length} registro(s), ${novosReps.length} representante(s) novo(s).`);
  document.getElementById('wstep3').classList.add('done');
  document.getElementById('wizardBody').innerHTML = emptyState('✅', `${vendas.length} registros importados com sucesso.`, `<button class="btn btn-primary btn-sm" onclick="renderImportacao()">Nova Importação</button> <button class="btn btn-ghost btn-sm" onclick="navigate('apuracao')">Ir para Apuração</button>`);
}

/* Filtra vendas de um período (campanha ou anterior) por um intervalo de datas [inicioISO, fimISO) */
function filtrarVendasPorIntervalo(vendas, inicioISO, fimISO) {
  const ini = parseISODate(inicioISO), fim = parseISODate(fimISO);
  return vendas.filter(v => {
    if (!v.data) return true; // sem data mapeada: inclui (não há como filtrar por semana)
    const d = parseISODate(String(v.data).slice(0, 10)) || (() => {
      // tenta formatos alternativos dd/mm/yyyy
      const partes = String(v.data).split(/[\/\-]/);
      if (partes.length === 3 && partes[2].length === 4) return new Date(+partes[2], +partes[1] - 1, +partes[0]);
      return null;
    })();
    if (!d) return true;
    return d >= ini && d < fim;
  });
}
/**
 * Calcula o % de crescimento coletivo da campanha comparando o total
 * (kg ou faturamento, conforme configurado na campanha) do período atual
 * contra o período anterior — somando TODAS as vendas, sem filtrar por
 * elegibilidade individual (a meta coletiva é da unidade, não do representante).
 */
function calcularMetaColetiva(vendasCamp, campoValor) {
  // campoValor: 'kg' (volume) ou 'valor' (faturamento em R$)
  const vAtual = vendasCamp.filter(v => v.periodo === 'campanha');
  const vAnterior = vendasCamp.filter(v => v.periodo === 'anterior');
  const totalAtual = vAtual.reduce((s, v) => s + (Number(v[campoValor]) || 0), 0);
  const totalAnterior = vAnterior.reduce((s, v) => s + (Number(v[campoValor]) || 0), 0);
  const crescimentoPct = totalAnterior > 0
    ? ((totalAtual - totalAnterior) / totalAnterior) * 100
    : (totalAtual > 0 ? 100 : 0);
  return { totalAtual, totalAnterior, crescimentoPct: Math.round(crescimentoPct * 100) / 100 };
}

async function calcularApuracao() {
  const campanhaId = document.getElementById('ap_campanha').value;
  if (!campanhaId) { showToast('Selecione uma campanha.', true); return; }
  const isParcial = document.getElementById('ap_modo_parcial') && document.getElementById('ap_modo_parcial').checked;
  const semanaAte = isParcial ? Number(document.getElementById('ap_semana').value || 0) : null;

  const [campanha, regras, regrasProduto, vendas, representantes, produtos] = await Promise.all([
    DB.get('campanhas', campanhaId), DB.getAll('regras'), DB.getAll('regrasProduto'),
    DB.getAll('vendas'), DB.getAll('representantes'), DB.getAll('produtos')
  ]);
  const regrasCamp = regras.filter(r => r.campanhaId === campanhaId);
  const regrasProdCamp = regrasProduto.filter(r => r.campanhaId === campanhaId);
  let vendasCamp = vendas.filter(v => v.campanhaId === campanhaId);
  if (!vendasCamp.length) { showToast('Nenhuma venda importada para esta campanha.', true); return; }

  let corteInfo = null;
  if (isParcial) {
    const pc = calcularPeriodos(campanha.dataInicio, campanha.dataFim);
    if (!pc) { showToast('Campanha sem período válido para apuração parcial.', true); return; }
    if (!semanaAte || semanaAte < 1) { showToast('Selecione até qual semana apurar.', true); return; }
    corteInfo = limitarPeriodoParcial(pc, semanaAte);

    const vCampFiltradas = filtrarVendasPorIntervalo(vendasCamp.filter(v => v.periodo === 'campanha'), corteInfo.campanhaInicioISO, corteInfo.campanhaFimISO);
    const vAntFiltradas = filtrarVendasPorIntervalo(vendasCamp.filter(v => v.periodo === 'anterior'), corteInfo.anteriorInicioISO, corteInfo.anteriorFimISO);
    vendasCamp = [...vCampFiltradas, ...vAntFiltradas];

    const infoBox = document.getElementById('apuracaoInfoPeriodo');
    if (infoBox) infoBox.innerHTML = `Apuração parcial até a <b>Semana ${corteInfo.numSemanas}</b> — Campanha: ${fmtDataBR(parseISODate(corteInfo.campanhaInicioISO))} → ${fmtDataBR(addDays(parseISODate(corteInfo.campanhaFimISO), -1))} · Período anterior (mesmo nº de semanas): ${fmtDataBR(parseISODate(corteInfo.anteriorInicioISO))} → ${fmtDataBR(addDays(parseISODate(corteInfo.anteriorFimISO), -1))}`;
  } else {
    const infoBox = document.getElementById('apuracaoInfoPeriodo');
    if (infoBox) infoBox.innerHTML = campanha.numSemanas ? `Apuração da campanha completa — ${campanha.numSemanas} semana(s): ${fmtDate(campanha.dataInicio)} → ${fmtDate(campanha.dataFim)}` : '';
  }

  const repIds = [...new Set(vendasCamp.map(v => v.representanteId).filter(Boolean))];
  const totalProdutosAtivos = Math.max(1, produtos.filter(p => p.ativo !== false && (!campanha.fornecedor || p.fornecedor === campanha.fornecedor)).length);
  const resultados = repIds.map(repId => {
    const rep = representantes.find(r => r.id === repId) || { nome: '—' };
    const vCamp = vendasCamp.filter(v => v.representanteId === repId && v.periodo === 'campanha');
    const vAnt = vendasCamp.filter(v => v.representanteId === repId && v.periodo === 'anterior');

    const kgCampanha = vCamp.reduce((s, v) => s + v.kg, 0);
    const kgAnterior = vAnt.reduce((s, v) => s + v.kg, 0);
    const faturamentoCampanha = vCamp.reduce((s, v) => s + v.valor, 0);
    const faturamentoAnterior = vAnt.reduce((s, v) => s + v.valor, 0);
    const clientesCampanha = new Set(vCamp.map(v => v.clienteCodigo || normalizeKey(v.cliente))).size;
    const clientesAnterior = new Set(vAnt.map(v => v.clienteCodigo || normalizeKey(v.cliente))).size;
    const pedidos = new Set(vCamp.map(v => v.pedido)).size;
    const produtosDistintos = new Set(vCamp.map(v => v.codigo || v.produto)).size;
    const mix = Math.min(100, (produtosDistintos / totalProdutosAtivos) * 100);
    // "positivação" = contagem de clientes ativados no período (não crescimento).
    // Mantido crescimentoClientes separado, caso alguma campanha queira usar % de crescimento de carteira.
    const positivacao = clientesCampanha - clientesAnterior; // saldo de clientes (pode ser negativo)
    const crescimentoClientes = clientesAnterior > 0 ? ((clientesCampanha - clientesAnterior) / clientesAnterior) * 100 : (clientesCampanha > 0 ? 100 : 0);
    const crescimentoKg = kgAnterior > 0 ? ((kgCampanha - kgAnterior) / kgAnterior) * 100 : (kgCampanha > 0 ? 100 : 0);
    const crescimentoFaturamento = faturamentoAnterior > 0 ? ((faturamentoCampanha - faturamentoAnterior) / faturamentoAnterior) * 100 : (faturamentoCampanha > 0 ? 100 : 0);

    const pontosProdutos = calcularPontosProdutos(vCamp, regrasProdCamp);
    const metricas = { kgCampanha, kgAnterior, faturamentoCampanha, faturamentoAnterior, clientesCampanha, clientesAnterior, pedidos, produtosDistintos, mix, positivacao, crescimentoClientes, crescimentoKg, crescimentoFaturamento, pontosProdutos };
    const resultado = aplicarRegras(regrasCamp, metricas, pontosProdutos);

    return { representanteId: repId, nome: rep.nome, regiao: rep.regiao || '—', ...metricas, ...resultado };
  });

  const apuracaoId = isParcial ? ('ap_' + campanhaId + '_parcial_s' + corteInfo.numSemanas) : ('ap_' + campanhaId);
  // Remove apurações anteriores do MESMO tipo (completa ou parcial daquela semana) para não acumular lixo, mas preserva outras parciais
  const existentes = (await DB.getAll('apuracoes')).filter(a => a.id === apuracaoId);
  for (const a of existentes) await DB.remove('apuracoes', a.id);

const campoColetivo = campanha.metaColetivaCampo === 'valor' ? 'valor' : 'kg';
  const metaColetiva = calcularMetaColetiva(vendasCamp, campoColetivo);
  const metaColetivaBatida = campanha.metaColetivaPct != null
    ? metaColetiva.crescimentoPct >= campanha.metaColetivaPct
    : null;

  const apuracao = {
    id: apuracaoId, campanhaId, geradoEm: new Date().toISOString(), resultados,
    parcial: isParcial, ateSemana: isParcial ? corteInfo.numSemanas : null,
    intervaloCampanha: isParcial ? { inicio: corteInfo.campanhaInicioISO, fim: corteInfo.campanhaFimISO } : { inicio: campanha.dataInicio, fim: campanha.dataFim },
    intervaloAnterior: isParcial ? { inicio: corteInfo.anteriorInicioISO, fim: corteInfo.anteriorFimISO } : { inicio: campanha.periodoAnteriorInicio, fim: campanha.periodoAnteriorFim },
    metaColetiva: {
      campo: campoColetivo,
      totalAtual: metaColetiva.totalAtual,
      totalAnterior: metaColetiva.totalAnterior,
      pctAtingido: metaColetiva.crescimentoPct,
      pctExigido: campanha.metaColetivaPct,
      batida: metaColetivaBatida
    }
  };
  await DB.put('apuracoes', apuracao);
  showToast(`Apuração ${isParcial ? 'parcial ' : ''}calculada para ${resultados.length} representante(s).`);
  desenharApuracao(apuracao);
}

function desenharApuracao(apuracao) {
  const ordenados = ordenarComDesempate(apuracao.resultados, null);
  document.getElementById('apuracaoResultado').innerHTML = `
    <div style="font-size:11px; color:var(--gray-text); margin-bottom:8px;">
      Gerada em ${new Date(apuracao.geradoEm).toLocaleString('pt-BR')}
      ${apuracao.parcial ? ` · <span class="period-status-badge andamento">Parcial — até Semana ${apuracao.ateSemana}</span>` : ' · <span class="period-status-badge concluida">Campanha completa</span>'}
      ${apuracao.metaColetiva && apuracao.metaColetiva.pctExigido != null ? `
        · Meta coletiva (${apuracao.metaColetiva.campo === 'valor' ? 'Faturamento' : 'Kg'}):
        <span class="period-status-badge ${apuracao.metaColetiva.batida ? 'concluida' : 'andamento'}">
          ${apuracao.metaColetiva.pctAtingido >= 0 ? '+' : ''}${apuracao.metaColetiva.pctAtingido}% de ${apuracao.metaColetiva.pctExigido}% exigido — ${apuracao.metaColetiva.batida ? 'Batida ✅' : 'Não batida ❌'}
        </span>` : ''}
    </div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>#</th><th>Representante</th><th>Kg (campanha)</th><th>Faturamento</th><th>Crescimento Kg</th><th>Clientes</th><th>Pontos</th><th>Elegível</th></tr></thead>
      <tbody>${ordenados.map((r, i) => `
        <tr>
          <td><span class="rank-pos">${i + 1}</span></td><td>${r.nome}</td>
          <td>${fmtKg(r.kgCampanha)}</td><td>${fmtMoney(r.faturamentoCampanha)}</td><td>${fmtPct(r.crescimentoKg)}</td>
          <td>${fmtNum(r.clientesCampanha)}</td><td>${fmtNum(r.pontosFinal)}</td>
          <td><span class="badge-eleg ${r.elegivel ? 'sim' : 'nao'}">${r.elegivel ? 'Sim' : 'Não'}</span></td>
        </tr>`).join('')}</tbody>
    </table></div>`;
}

/* ══════════════════ RANKINGS ══════════════════ */
const RANKING_TIPOS = [
  { valor: 'pontosFinal', label: 'Geral (Pontos)' },
  { valor: 'kgCampanha', label: 'Por KG' },
  { valor: 'faturamentoCampanha', label: 'Por Faturamento' },
  { valor: 'crescimentoKg', label: 'Por Crescimento (Kg)' },
  { valor: 'positivacao', label: 'Por Positivação' },
  { valor: 'mix', label: 'Por Mix de Produtos' },
  { valor: 'clientesCampanha', label: 'Por Clientes' },
];

async function renderRankings() {
  const campanhas = await DB.getAll('campanhas');
  root().innerHTML = pageHeader('Rankings', 'Classificação de representantes por diferentes critérios',
    `<button class="btn btn-ghost btn-sm" onclick="exportarRankingCSV()">↓ CSV</button><button class="btn btn-ghost btn-sm" onclick="exportarRankingPDF()">↓ PDF</button>`) +
    `<div class="box">
      <div class="form-grid" style="margin-bottom:6px;">
        <div class="field"><label>Campanha</label><select id="rk_campanha" onchange="carregarRanking()">${campanhas.map(c => `<option value="${c.id}">${c.nome} — ${c.fornecedor}</option>`).join('') || '<option value="">Nenhuma</option>'}</select></div>
        <div class="field"><label>Tipo de ranking</label><select id="rk_tipo" onchange="carregarRanking()">${RANKING_TIPOS.map(t => `<option value="${t.valor}">${t.label}</option>`).join('')}</select></div>
      </div>
      <div id="rankingResultado"></div>
    </div>`;
  if (campanhas.length) carregarRanking();
}

let _rankingAtual = [];
async function carregarRanking() {
  const campanhaId = document.getElementById('rk_campanha').value;
  const tipo = document.getElementById('rk_tipo').value;
  if (!campanhaId) { document.getElementById('rankingResultado').innerHTML = emptyState('🏆', 'Nenhuma campanha selecionada.'); return; }
  const [campanha, apuracoes] = await Promise.all([DB.get('campanhas', campanhaId), DB.getAll('apuracoes')]);
  const candidatas = apuracoes.filter(a => a.campanhaId === campanhaId);
  // prioriza a apuração completa mais recente; se só houver parcial, usa a última
  const apuracao = candidatas.find(a => !a.parcial) || candidatas.sort((a, b) => new Date(b.geradoEm) - new Date(a.geradoEm))[0];
  if (!apuracao) { document.getElementById('rankingResultado').innerHTML = emptyState('📊', 'Calcule a apuração desta campanha primeiro.', `<button class="btn btn-primary btn-sm" onclick="navigate('apuracao')">Ir para Apuração</button>`); return; }

  const elegiveis = apuracao.resultados.filter(r => tipo === 'positivacao' ? r.elegivelBonus : r.elegivel);
  const ordenados = tipo === 'pontosFinal' ? ordenarComDesempate(elegiveis, campanha.desempate) : [...elegiveis].sort((a, b) => (b[tipo] || 0) - (a[tipo] || 0));
  _rankingAtual = ordenados;
const isPct = tipo === 'crescimentoKg' || tipo === 'crescimentoClientes' || tipo === 'mix';
const isSaldo = tipo === 'positivacao';
const isMoney = tipo === 'faturamentoCampanha';
const isKg = tipo === 'kgCampanha';

  document.getElementById('rankingResultado').innerHTML = `
    ${apuracao.parcial ? `<div style="margin-bottom:8px;"><span class="period-status-badge andamento">Baseado em apuração parcial — até Semana ${apuracao.ateSemana}</span></div>` : ''}
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>#</th><th>Representante</th><th>Região</th><th>${RANKING_TIPOS.find(t => t.valor === tipo).label}</th><th>Pontos</th><th>Elegível</th></tr></thead>
      <tbody>${ordenados.map((r, i) => `
        <tr>
          <td><span class="rank-pos">${i + 1}</span></td><td>${r.nome}</td><td>${r.regiao}</td>
          ${isPct ? fmtPct(r[tipo]) : isSaldo ? fmtSaldo(r[tipo]) : isMoney ? fmtMoney(r[tipo]) : isKg ? fmtKg(r[tipo]) : fmtNum(r[tipo])}
          <td>${fmtNum(r.pontosFinal)}</td>
          <td><span class="badge-eleg sim">Sim</span></td>
        </tr>`).join('') || '<tr><td colspan="6"><div class="empty-state">Nenhum representante elegível.</div></td></tr>'}</tbody>
    </table></div>`;
}
function exportarRankingCSV() {
  if (!_rankingAtual.length) { showToast('Nada para exportar.', true); return; }
  downloadCSV('ranking.csv', _rankingAtual.map((r, i) => ({ posicao: i + 1, representante: r.nome, regiao: r.regiao, pontos: r.pontosFinal, kg: r.kgCampanha, faturamento: r.faturamentoCampanha })));
}
function exportarRankingPDF() {
  if (!_rankingAtual.length) { showToast('Nada para exportar.', true); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text('Ranking de Representantes', 14, 14);
  doc.autoTable({ startY: 20, head: [['#', 'Representante', 'Região', 'Pontos', 'Kg', 'Faturamento']], body: _rankingAtual.map((r, i) => [i + 1, r.nome, r.regiao, fmtNum(r.pontosFinal), fmtKg(r.kgCampanha), fmtMoney(r.faturamentoCampanha)]) });
  doc.save('ranking.pdf');
}

/* ══════════════════ CONFIGURAÇÕES ══════════════════ */
async function renderConfiguracoes() {
  const counts = {};
  for (const s of ['campanhas', 'produtos', 'representantes', 'vendas', 'regras', 'regrasProduto', 'mapeamentos', 'apuracoes']) counts[s] = (await DB.getAll(s)).length;
  root().innerHTML = pageHeader('Configurações', 'Preferências do sistema e gerenciamento de dados') +
    `<div class="row-2">
      <div class="box">
        <div class="box-title" style="margin-bottom:10px;">Aparência</div>
        <button class="btn btn-ghost" onclick="toggleTheme()">🌓 Alternar tema claro/escuro</button>
      </div>
      <div class="box">
        <div class="box-title" style="margin-bottom:10px;">Dados armazenados (IndexedDB)</div>
        <div class="table-wrap"><table class="data-table"><tbody>
          ${Object.entries(counts).map(([k, v]) => `<tr><td>${k}</td><td>${fmtNum(v)}</td></tr>`).join('')}
        </tbody></table></div>
        <div style="display:flex; gap:8px; margin-top:12px;">
          <button class="btn btn-ghost btn-sm" onclick="exportarBackup()">↓ Exportar backup (JSON)</button>
          <button class="btn btn-danger btn-sm" onclick="limparTudo()">🗑 Limpar todos os dados</button>
        </div>
      </div>
    </div>`;
}
async function exportarBackup() {
  const backup = {};
  for (const s of ['campanhas', 'produtos', 'representantes', 'vendas', 'regras', 'regrasProduto', 'mapeamentos', 'apuracoes', 'config']) backup[s] = await DB.getAll(s);
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  saveAs(blob, 'pmg-campanhas-backup.json');
  showToast('Backup exportado.');
}
async function limparTudo() {
  if (!confirm('Isso apagará TODOS os dados do sistema (campanhas, produtos, vendas, etc). Deseja continuar?')) return;
  await DB.clearAll();
  showToast('Todos os dados foram apagados.');
  navigate('dashboard'); atualizarHdrCampanha();
}

</script>
